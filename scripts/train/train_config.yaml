# =============================================================================
# SCA 单细胞注释模型 — 训练超参数配置文件
# =============================================================================
# 修改此文件后直接重新运行 train_qwen3_hf_trl.py，无需改动代码。
# 所有路径均相对于项目根目录（singal_cell_annotation/）。
# =============================================================================


# -----------------------------------------------------------------------------
# 模型选择
# -----------------------------------------------------------------------------
# 可选值: "4B" 或 "8B"
#   "4B" → 使用 bf16 全精度 LoRA，显存约 20GB，适合单张 24GB GPU
#         推荐：4B bf16 无量化噪声，SFT 后能正确输出 CL 标准名称，
#               在 ~88 训练样本时已达 31.9% exact / 58% ontology-compatible
#   "8B" → 自动切换为 QLoRA（4-bit 量化 + LoRA），显存约 10-12GB，
#           量化噪声 + 更强预训练先验 → 模型倾向输出缩写名 / 组织偏置预测，
#           实测 exact=14.5%，劣于 4B；不推荐
# 【已切换】原来: "8B"
model_size: "4B"


# -----------------------------------------------------------------------------
# 路径配置
# -----------------------------------------------------------------------------
# 训练集（JSONL 格式，每行是一个包含 messages 列表的样本）
train_file: "data/splits/train_messages_no_think_v3.jsonl"

# 验证集（每 eval_steps 步计算一次验证 loss，用于监控过拟合）
val_file: "data/splits/val_messages_no_think_v3.jsonl"

# 输出目录（保存 adapter 权重、checkpoint、指标等）
# 留空 "" 时自动生成带时间戳的目录名，如 output/qwen3_8b_sc_sft_hf_trl_v2_20260405_123456
output_dir: ""


# -----------------------------------------------------------------------------
# 训练超参数
# -----------------------------------------------------------------------------
# 随机种子：保证实验可复现
seed: 42

# 最长序列长度（单位：token）
# 超出此长度的样本会被截断。
# v2 prompt 含 ontology 字段，实测部分样本超过 1024，调至 1536 避免截断。
max_length: 1536

# 训练轮数（整个训练集被遍历的次数）
# 【已调整】原来: 5
# 净化后训练数据多样性增加（parent_cell_type 补全），模型需要更多步才能收敛。
# 上轮（净化前）5 epoch / 135 步 eval_loss 触底 0.076；
# 净化后 5 epoch eval_loss 还在 0.327 下降中，远未收敛。
# 提高到 10 epoch（~270 步）给模型足够时间学习新的 parent 输出。
num_train_epochs: 10

# 每块 GPU 每个训练步处理的样本数
# 【已调整】原来: 1
# 8B QLoRA 实际显存占用仅 12GB，24GB 卡还有 12GB 余量。
# batch=2 增加约 3-4GB 显存（激活值翻倍），总计约 16GB，仍在安全范围内。
# 更大的实际 batch 让梯度估计更准确，有助于泛化。
per_device_train_batch_size: 2
per_device_eval_batch_size: 2

# 梯度累积步数
# 【已调整】原来: 4
# 等效 batch size = per_device_train_batch_size × gradient_accumulation_steps
# 现在: 2 × 8 = 16（原来是 1 × 4 = 4）
# 等效 batch 从 4 提升到 16：梯度方向更稳定，模型更难死记硬背单条样本。
gradient_accumulation_steps: 8

# 学习率：控制每步参数更新的幅度
# 【已调整】原来: 5.0e-5
# batch 变大（×4）后按线性缩放规则应降低 LR，防止步长过大导致震荡。
# 同时更低的 LR 配合更长的 warmup，整体训练更平滑。
learning_rate: 2.0e-5

# 学习率调度策略
# "cosine"：从目标学习率按余弦曲线衰减到接近 0，训练后期收敛更平稳
lr_scheduler_type: "cosine"

# 预热比例：前 warmup_ratio × 总步数 步内，学习率从 0 线性增长到目标值
# 【已调整】原来: 0.05
# LR 降低后需要更长预热期让优化器稳定，从 5% 提升到 10%。
warmup_ratio: 0.1

# 权重衰减（L2 正则化）：防止模型参数过大，有一定防过拟合效果
weight_decay: 0.01


# -----------------------------------------------------------------------------
# 保存与评估频率
# -----------------------------------------------------------------------------
# 每 N 步打印一次训练 loss 到日志
logging_steps: 1

# 每 N 步在验证集上跑一次完整 eval，计算 eval_loss
eval_steps: 5

# 每 N 步保存一次模型 checkpoint（adapter 权重）
save_steps: 5

# 最多保留的 checkpoint 数量，超过后自动删除最旧的
save_total_limit: 3


# -----------------------------------------------------------------------------
# LoRA 超参数
# （LoRA: Low-Rank Adaptation，仅训练少量低秩矩阵，大幅减少可训练参数）
# -----------------------------------------------------------------------------
# LoRA 秩（rank）：低秩矩阵的维度
# 含义：在原始权重矩阵 W (d×k) 旁边增加 ΔW = A×B，其中 A(d×r), B(r×k)
# r 越大 → 可学习内容越多，但在小数据集上越容易过拟合
# 常用值：4 / 8 / 16 / 32 / 64
# 【已调整】原来: 8（当时数据只有 ~437 条，r=8 防过拟合）
# 现在训练集 991 条（2.3×），r=16 可学习更丰富的模式。
# load_best_model_at_end=True 会自动选最低 eval_loss checkpoint，过拟合风险受控。
# 显存估算：4B bf16 + r=16 all-linear + batch=2 + gc=True + maxlen=1536 ≈ 14GB（安全）。
lora_r: 16

# LoRA 缩放系数：实际更新量 = (alpha/r) × ΔW
# 与 lora_r 同步，保持 alpha/r = 2 的比例不变（缩放因子维持 2.0）。
lora_alpha: 32

# LoRA 层的 dropout 概率：随机将部分 LoRA 输出置零，防止过拟合
# 991 条数据相比 437 条过拟合风险下降，但保留 0.1 保守正则化。
lora_dropout: 0.1

# 要注入 LoRA 的线性层
# "all-linear"：对所有线性层（attention + FFN）都加 LoRA，效果最好
lora_target_modules: "all-linear"


# -----------------------------------------------------------------------------
# 精度与显存优化
# -----------------------------------------------------------------------------
# 使用 bfloat16 混合精度训练（RTX 4090 / A100 原生支持）
use_bf16: true

# 使用 float16 混合精度（与 bf16 互斥，选其一）
use_fp16: false

# 梯度检查点（Gradient Checkpointing）
# 原理：前向传播时不保存中间激活值，反向传播时按需重新计算
# 效果：显存减少约 30-50%，但训练速度下降约 20-30%
gradient_checkpointing: true


# -----------------------------------------------------------------------------
# QLoRA 专属配置（model_size = "8B" 时生效）
# QLoRA = Quantized LoRA：将基础模型量化为 4-bit，LoRA 部分仍用 bf16 计算
# -----------------------------------------------------------------------------
# 4-bit 量化类型
# "nf4"（NormalFloat4）：针对正态分布权重设计，精度最好（推荐）
bnb_4bit_quant_type: "nf4"

# 双重量化：对量化的缩放参数再做一次量化，额外节省约 1.5GB 显存
bnb_4bit_use_double_quant: true


# -----------------------------------------------------------------------------
# 其他配置
# -----------------------------------------------------------------------------
# Qwen3 thinking 模式开关
# 当前训练数据是 no_think 版本，保持 false
enable_thinking: false

# 数据加载器的并行 worker 数量
dataloader_num_workers: 2

# 仅从本地磁盘加载模型，不尝试联网下载
local_files_only: true

# 信任模型自带的 Python 代码（Qwen3 使用自定义的 modeling 实现）
trust_remote_code: true
